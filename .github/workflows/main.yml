---
name: Lints and builds all recipes affected by this repository

on:
  push:
    branches: ["dunfell"]
  pull_request:
    branches: ["dunfell"]

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check on scripts
        run: ruff check scripts

      - name: Run ruff format on scripts
        run: ruff format scripts/

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on workflows
        run: yamllint .github/workflows/

      - name: Bitbake dry-run check
        uses: ./.github/workflows/bitbake-common.yml
        with:
          dry-run: true
          runner: ubuntu-latest

  build:
    needs: lint
    uses: ./.github/workflows/bitbake-common.yml
    with:
      dry-run: false
      runner: yocto_build_host
