---
name: Lints, parses, and builds all recipes provided/modified by meta-lts-collab

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: ["dunfell"]

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff==0.14.5

      - name: Run ruff check on scripts
        run: ruff check scripts

      - name: Run ruff format on scripts
        run: ruff format scripts/

      - name: Install yamllint
        run: pip install yamllint==1.37.1

      - name: Run yamllint on workflows
        run: yamllint .github/workflows/

  parse:
    needs: lint
    uses: ./.github/workflows/bitbake-common.yml
    with:
      branch: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
      only-build-modified: false
      parse-only: true
      runner: ubuntu-22.04

  build:
    needs: parse
    uses: ./.github/workflows/bitbake-common.yml
    with:
      branch: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
      only-build-modified: true
      parse-only: false
      runner: yocto_build_host
