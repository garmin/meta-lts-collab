---
name: Lint Common Steps
on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      runner:
        default: ubuntu-22.04
        description: 'The runner to execute this workfow with'
        required: false
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: 'Lint scripts & CI'
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install -r requirements-dev.txt

      - name: Run ruff check on scripts
        run: ruff check scripts

      - name: Run ruff format on scripts
        run: ruff format scripts/

      - name: Run yamllint on workflows
        run: yamllint .github/workflows/

      - name: Run oelint-adv
        run: oelint-adv $(find -name '*.bb' -o -name '*.bbappend' -o -name '*.conf')
