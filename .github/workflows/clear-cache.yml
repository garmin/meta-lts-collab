---
name: Clear existing cache

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      skip-clear:
        default: false
        required: false
        type: boolean

permissions:
  actions: write

jobs:
  delete-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Skip deleting cache
        if: ${{ inputs.skip-clear }}
        run: |
          echo "Skipping cache deletion"
      - name: Delete cache
        if: ${{ !inputs.skip-clear }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete --all --repo "${GITHUB_REPOSITORY}" --succeed-on-no-caches
