---
name: Bitbake Common Steps
on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      branch:
        description: 'The Yocto branch that is intended to be built'
        required: true
        type: string
      only-build-modified:
        description: 'If true, bitbake will only build the recipes that are affected by the PR'
        required: true
        type: boolean
      parse-only:
        description: 'If true, bitbake only parses and does not build'
        required: true
        type: boolean
      runner:
        description: 'The runner to execute this workfow with'
        required: true
        type: string
      save-cache:
        description: 'Saves the download and sstate cache after the build finishes'
        default: false
        required: false
        type: boolean
      use-cache:
        description: 'Restores the download and sstate cache before building'
        default: true
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  bitbake:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Clone meta-lts-collab
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
        with:
          path: ./meta-lts-collab

      - name: Clone poky (${{ inputs.branch }})
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
        with:
          repository: yoctoproject/poky
          ref: ${{ inputs.branch }}
          path: ./poky

      - name: Clone meta-oe (${{ inputs.branch }})
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
        with:
          repository: openembedded/meta-openembedded
          ref: ${{ inputs.branch }}
          path: ./meta-oe

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gawk wget git-core diffstat unzip texinfo gcc-multilib \
            build-essential chrpath socat cpio python3 python3-pip \
            python3-pexpect xz-utils debianutils iputils-ping python3-git \
            python3-jinja2 libegl1-mesa libsdl1.2-dev pylint xterm \
            python3-subunit mesa-common-dev

      - name: Restore downloads and sstate
        id: cache-restore
        if: ${{ inputs.use-cache }}
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/build/downloads
            ${{ github.workspace }}/build/sstate-cache
          key: ${{ runner.name }}-downloads-and-sstate

      - name: Get changed files
        id: changed-files
        if: ${{ inputs.only-build-modified }}
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62  # v47

      - name: Get build targets
        id: targets
        run: |
          if [ "${{ inputs.only-build-modified }}" = "true" ]; then
            get_bitbake_targets_args="${{ steps.changed-files.outputs.all_changed_files }}"
          else
            get_bitbake_targets_args=""
          fi
          # changed-files outputs filepaths relative to the repository root
          # although get-bitbake-targets.py can be called from anywhere, it's
          # easiest to just cd to the repository root when running this command.
          TARGETS=$(
            cd $GITHUB_WORKSPACE/meta-lts-collab &&
            ./scripts/get-bitbake-targets.py \
              ${get_bitbake_targets_args}
          )
          echo "build_targets=$TARGETS" >> $GITHUB_OUTPUT

      - name: Setup and run bitbake
        if: ${{ steps.targets.outputs.build_targets != '' }}
        run: |
          # Source build environment
          source poky/oe-init-build-env

          # Add all layers
          bitbake-layers add-layer $GITHUB_WORKSPACE/meta-oe/meta-*
          bitbake-layers add-layer $GITHUB_WORKSPACE/meta-lts-collab
          bitbake-layers show-layers

          # Add CI configurations
          echo "require $GITHUB_WORKSPACE/meta-lts-collab/conf/ci.conf" >> conf/auto.conf

          # Run bitbake
          extra_args=""
          if [ "${{ inputs.parse-only }}" = "true" ]; then
            extra_args="--parse-only"
          fi
          bitbake $extra_args ${{ steps.targets.outputs.build_targets }}

      - name: Save downloads and sstate
        if: ${{ inputs.save-cache && steps.targets.outputs.build_targets != '' }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/build/downloads
            ${{ github.workspace }}/build/sstate-cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
